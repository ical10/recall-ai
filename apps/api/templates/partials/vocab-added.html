<div class="card-paper tilt-r relative animate-pop-in">
  <span class="washi washi--teal -top-3 right-8 tilt-l-2"></span>

  <div class="flex items-start gap-4">
    <span class="inline-flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl border-2 border-ink bg-teal text-cream-50">
      <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
    </span>
    <div>
      <p class="font-mono text-[11px] uppercase tracking-[0.22em] text-ink-mute">Added · due now</p>
      <p class="mt-1 font-display text-3xl font-black leading-tight">
        <span class="marker marker--teal">{{ token }}</span>
      </p>
      <p class="mt-2 text-sm text-ink-mute">
        Sitting in your queue. Open review when you're ready.
      </p>
    </div>
  </div>

  <div class="mt-5 flex flex-wrap gap-3">
    <a href="/review" class="btn-pop btn-pop--ink text-sm">Review now</a>
    <button
      hx-get="/vocab/form"
      hx-target="closest div.card-paper"
      hx-swap="outerHTML"
      class="btn-pop btn-pop--ghost text-sm"
    >
      Add another
    </button>
  </div>
</div>
