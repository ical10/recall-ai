<form hx-post="/vocab" hx-ext="json-enc" hx-target="this" hx-swap="outerHTML" class="rounded-lg border border-slate-200 bg-white p-6">
  <h2 class="text-lg font-semibold text-slate-900">Add Vocabulary</h2>
  <div class="mt-4 flex gap-3">
    <label class="flex-1">
      <span class="text-sm text-slate-500">Word / Phrase</span>
      <input
        type="text"
        name="token"
        required
        minlength="1"
        maxlength="255"
        placeholder="e.g. ephemeral"
        class="mt-1 w-full rounded-md border border-slate-200 px-3 py-2 text-slate-900 placeholder-slate-400"
      />
    </label>
    <label class="w-40">
      <span class="text-sm text-slate-500">Language</span>
      <select
        name="language"
        class="mt-1 w-full rounded-md border border-slate-200 px-3 py-2 text-slate-900"
      >
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="es">Spanish</option>
        <option value="">Other</option>
      </select>
    </label>
  </div>
  <button type="submit" class="mt-4 rounded-md bg-slate-900 px-4 py-2 text-white hover:bg-slate-700">
    Add
  </button>
</form>
