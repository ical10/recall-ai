<div class="card-paper tilt-l relative animate-pop-in">
  <span class="washi washi--berry -top-3 right-8 tilt-r-2"></span>

  <div class="flex items-start gap-4">
    <span class="inline-flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl border-2 border-ink bg-honey text-ink">
      <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5"/><circle cx="12" cy="16.5" r="1" fill="currentColor"/></svg>
    </span>
    <div>
      <p class="font-mono text-[11px] uppercase tracking-[0.22em] text-ink-mute">Already in deck</p>
      <p class="mt-1 font-display text-3xl font-black leading-tight">
        <span class="marker">{{ token }}</span>
      </p>
      <p class="mt-2 text-sm text-ink-mute">
        Nothing to add — this one's already on the rotation.
      </p>
    </div>
  </div>

  <div class="mt-5">
    <button
      hx-get="/vocab/form"
      hx-target="closest div.card-paper"
      hx-swap="outerHTML"
      class="btn-pop btn-pop--ghost text-sm"
    >
      Try a different word
    </button>
  </div>
</div>
