<div
  id="review-card"
  class="card-paper--lg relative overflow-hidden text-center animate-pop-in"
>
  <span aria-hidden="true" class="confetti-dot left-[10%] top-2 bg-tangerine" style="animation-delay: 0ms"></span>
  <span aria-hidden="true" class="confetti-dot left-[25%] top-2 bg-teal" style="animation-delay: 120ms"></span>
  <span aria-hidden="true" class="confetti-dot left-[40%] top-2 bg-honey" style="animation-delay: 240ms"></span>
  <span aria-hidden="true" class="confetti-dot left-[55%] top-2 bg-sky" style="animation-delay: 80ms"></span>
  <span aria-hidden="true" class="confetti-dot left-[70%] top-2 bg-berry" style="animation-delay: 320ms"></span>
  <span aria-hidden="true" class="confetti-dot left-[85%] top-2 bg-tangerine" style="animation-delay: 200ms"></span>
  <span aria-hidden="true" class="confetti-dot left-[18%] top-2 bg-sky" style="animation-delay: 440ms"></span>

  <div class="mx-auto inline-flex h-20 w-20 items-center justify-center rounded-3xl border-2 border-ink bg-teal shadow-pop animate-wiggle">

      <path d="M5 12l5 5L20 7"/>

  </h1>
  <p class="mt-4 text-lg text-ink-soft">
    Empty queue. Your future self will thank you.
  </p>

  <div class="mt-8 flex flex-wrap items-center justify-center gap-3">
    <a href="/dashboard" class="btn-pop btn-pop--ink text-base">
      Back to deck
    </a>
    <a href="/dashboard#add" class="btn-pop btn-pop--ghost text-base">
      Add a new word
    </a>
  </div>
</div>
