<div
  id="review-card"
  class="card-paper--lg tilt-l-2 relative animate-pop-in"
  hx-target="this"
  hx-swap="outerHTML"
>
  <span class="washi -top-4 left-12 tilt-r-2"></span>

  <div class="flex items-center justify-between">
    <span class="font-mono text-[11px] uppercase tracking-[0.22em] text-ink-mute">
      {{ vocab.language|default("en") }} · prompt
    </span>
    <span class="chip">
      <span class="inline-block h-1.5 w-1.5 rounded-full bg-tangerine"></span>
      Recall it
    </span>
  </div>

  <h1 class="mt-8 font-display text-7xl font-black leading-[0.95] tracking-tight md:text-8xl">
    {{ vocab.token }}
  </h1>

  <p class="mt-6 max-w-md text-ink-mute">
    Read it. Say it. Try to picture the meaning before you flip.
  </p>

  <div class="mt-8 flex flex-wrap items-center gap-3">
    <button
      class="btn-pop btn-pop--primary text-base"
      hx-get="/review/{{ review.id }}/reveal"
    >
      Reveal definition
      <span aria-hidden="true">↓</span>
    </button>
    <span class="font-mono text-xs uppercase tracking-widest text-ink-mute">
      space to flip
    </span>
  </div>
</div>
