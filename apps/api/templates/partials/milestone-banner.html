<div class="card-paper--lg tilt-r relative mb-8 animate-pop-in">
  <span class="washi washi--teal -top-4 left-12 tilt-l-2"></span>

  <div class="flex flex-wrap items-center justify-between gap-4">
    <div>
      <p class="font-mono text-[11px] uppercase tracking-[0.22em] text-ink-mute">
        Milestone unlocked
      </p>
      <h2 class="mt-2 font-display text-3xl font-black leading-tight tracking-tight md:text-4xl">
        <span aria-hidden="true">🎉</span>
        You hit <span class="marker marker--teal">{{ stats.unseen_milestone }} reviews</span>.
      </h2>
      <p class="mt-2 text-ink-soft">
        New personalized words are sitting in your queue.
      </p>
    </div>
    <form hx-post="/milestones/seen" hx-swap="none">
      <button type="submit" class="btn-pop btn-pop--teal text-base">
        Open them
        <span aria-hidden="true">→</span>
      </button>
    </form>
  </div>
</div>
