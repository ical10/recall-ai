<div
  id="review-card"
  class="card-paper--lg tilt-r relative animate-flip-in"
  hx-target="this"
  hx-swap="outerHTML"
>
  <span class="washi washi--teal -top-4 right-10 tilt-l-2"></span>

  <div class="flex items-center justify-between">
    <span class="font-mono text-[11px] uppercase tracking-[0.22em] text-ink-mute">
      {{ vocab.language|default("en") }} · revealed
    </span>
    <span class="chip">
      <span class="inline-block h-1.5 w-1.5 rounded-full bg-teal"></span>
      How did you do?
    </span>
  </div>

  <h1 class="mt-6 font-display text-5xl font-black leading-none tracking-tight md:text-6xl">
    {{ vocab.token }}
  </h1>

  <p class="mt-5 text-lg leading-relaxed text-ink">
    {{ vocab.definition }}
  </p>

  {% if vocab.example_sentence %}
  <div class="mt-5 rounded-2xl border-2 border-dashed border-ink/25 bg-cream-100/60 p-4">
    <p class="font-mono text-[10px] uppercase tracking-widest text-ink-mute">in context</p>
    <p class="mt-1 font-display text-lg italic leading-snug text-ink-soft">
      "{{ vocab.example_sentence }}"
    </p>
  </div>
  {% endif %}

  <p class="mt-7 font-mono text-[11px] uppercase tracking-[0.22em] text-ink-mute">
    Rate your recall
  </p>

  <div class="mt-3 grid grid-cols-2 gap-3 sm:grid-cols-4">
    <button
      class="btn-pop btn-pop--berry flex-col py-4 text-sm"
      hx-post="/review/{{ review.id }}/rate"
      hx-vals='{"quality": 0}'
    >
      <span class="text-2xl leading-none" aria-hidden="true">😵</span>
      <span class="mt-1.5">Again</span>
    </button>
    <button
      class="btn-pop btn-pop--honey flex-col py-4 text-sm"
      hx-post="/review/{{ review.id }}/rate"
      hx-vals='{"quality": 2}'
    >
      <span class="text-2xl leading-none" aria-hidden="true">😬</span>
      <span class="mt-1.5">Hard</span>
    </button>
    <button
      class="btn-pop btn-pop--teal flex-col py-4 text-sm"
      hx-post="/review/{{ review.id }}/rate"
      hx-vals='{"quality": 4}'
    >
      <span class="text-2xl leading-none" aria-hidden="true">😌</span>
      <span class="mt-1.5">Good</span>
    </button>
    <button
      class="btn-pop btn-pop--sky flex-col py-4 text-sm"
      hx-post="/review/{{ review.id }}/rate"
      hx-vals='{"quality": 5}'
    >
      <span class="text-2xl leading-none" aria-hidden="true">🤩</span>
      <span class="mt-1.5">Easy</span>
    </button>
  </div>
</div>

<style>
  .btn-pop.flex-col { flex-direction: column; gap: 0; padding-top: 0.85rem; padding-bottom: 0.85rem; }
</style>
