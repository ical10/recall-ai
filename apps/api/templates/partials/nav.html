<nav class="border-b border-gray-200 bg-white">
  <div class="mx-auto flex max-w-3xl items-center justify-between px-4 py-3">
    <div class="flex items-center gap-4">
      <a href="/dashboard" class="text-lg font-semibold text-gray-800 hover:text-gray-600">
        RecallAI
      </a>
      {% if user %}
      <form hx-post="/review/language" hx-trigger="change" class="flex items-center gap-1">
        <select name="language" class="rounded border border-gray-300 px-2 py-1 text-sm text-gray-600">
          <option value="">All languages</option>
          <option value="en" {% if review_language == "en" %}selected{% endif %}>English</option>
          <option value="fr" {% if review_language == "fr" %}selected{% endif %}>French</option>
          <option value="de" {% if review_language == "de" %}selected{% endif %}>German</option>
          <option value="es" {% if review_language == "es" %}selected{% endif %}>Spanish</option>
        </select>
      </form>
      {% endif %}
    </div>
    <div>
      {% if user %}
      <span class="mr-4 text-sm text-gray-600">{{ user.name }}</span>
      <a href="/auth/logout" class="text-sm text-gray-500 hover:text-gray-800">Logout</a>
      {% else %}
      <a href="/auth/login-page" class="text-sm text-gray-500 hover:text-gray-800">Login</a>
      {% endif %}
    </div>
  </div>
</nav>
