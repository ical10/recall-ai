version: 2

updates:
  # GitHub Actions — pin updates keep supply-chain hygiene automatic
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kuala_Lumpur"
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    # Major version bumps (e.g. actions/checkout v4 → v5) stay ungrouped
    # so each gets its own PR for deliberate review.

  # npm/pnpm — Node dev dependencies (Tailwind, concurrently, turbo)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kuala_Lumpur"
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # uv / PyPI — Python runtime and dev dependencies
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kuala_Lumpur"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
