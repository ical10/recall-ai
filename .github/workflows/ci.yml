name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
      REDIS_URL: "redis://localhost:6379/0"
      LLM_API_KEY: "test-key"
      LLM_BASE_URL: "https://test.invalid/v1"
      LLM_MODEL: "test/test-model"
      SECRET_KEY: "test-secret"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.4.0
        with:
          version: 9.0.0

      - name: Set up Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182  # v5.4.1

      - name: Cache uv virtualenv
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  migration-check:
    name: Migration Check
    runs-on: ubuntu-latest
    # Runs in parallel with lint-and-test for speed.
    # No 'needs' dependency — migrations are an independent gate.

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql://test:test@localhost:5432/test"
      REDIS_URL: "redis://localhost:6379/0"
      LLM_API_KEY: "test-key"
      LLM_BASE_URL: "https://test.invalid/v1"
      LLM_MODEL: "test/test-model"
      SECRET_KEY: "test-secret"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182  # v5.4.1

      - name: Cache uv virtualenv
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install Python dependencies
        run: uv sync --frozen

      # asyncpg (used at runtime) requires the DB to accept asyncpg connections.
      # Alembic's env.py calls to_async_url() which converts postgresql:// → postgresql+asyncpg://.
      # We set DATABASE_URL as plain postgresql:// so to_async_url() does the conversion for us.
      # alembic.ini uses relative paths (script_location = alembic, prepend_sys_path = .),
      # so all alembic commands run from apps/api/ where alembic.ini lives.
      - name: Run migrations up
        run: uv run alembic upgrade head
        working-directory: apps/api

      - name: Run migrations down
        run: uv run alembic downgrade base
        working-directory: apps/api

      - name: Run migrations up again (idempotency check)
        run: uv run alembic upgrade head
        working-directory: apps/api

  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # full history so gitleaks can scan all commits in the diff

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
